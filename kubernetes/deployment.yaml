apiVersion: apps/v1

kind: Deployment

metadata:
  name: myapp-deployment

spec:
  replicas: 3

  selector:
   matchLabels:
    app: myapp

  template:
   metadata:
     labels:
      app: myapp

   spec:
     containers:
      - name: myapp-container
        image: anjali1410/myapp:v1
        ports:
         - containerPort: 80